<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <title>Test of the D3 slider</title>
    <script src="https://d3js.org/d3.v6.js"></script>
    <script src="https://unpkg.com/d3-simple-slider"></script>
  </head>

  <body>
    <script>
      //var  = sliderContainer =
      var v;
      var worldHeight = 1000;
      var worldWidth = 1000;

      var svg = d3.select("body").append("svg")
        .attr("width", worldWidth)
        .attr("height",worldHeight);

      var timeInfo = svg
        .append("text")
        .attr("x",50)
        .attr("y", 500)
        .attr("fill","black")
        .text("0 K")
        .attr("stroke","none");


      var slider = d3
        .sliderHorizontal()
        .min(0)
        .max(100)
        .ticks(20)
        .step(1)
        .width(500)
        .height(300)
        .displayValue(false)
        .on('onchange', (val) => {;
          v = val
          timeInfo.text(v.toFixed(0)+" K");
        });

      svg
        .append('g')
        .attr('transform', 'translate('+50+','+400+')')
        .call(slider);
    </script>
  </body>

</html>
